<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Flashcards Smart Importer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select, input[type="file"] { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .btn-import { background: #2196F3; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-import:hover { background: #1976D2; }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        .info-box { font-size: 0.85rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Hromadný Importer</h2>
    
    <div class="section">
        <label for="categorySelect">1. Vyber cílovou kategorii:</label>
        <select id="categorySelect">
            <option value="none">-- Bez kategorie (Hlavní menu) --</option>
        </select>
        <div class="info-box">Kategorie se načítají z tvé aplikace Flashcards.</div>
    </div>

    <div class="section">
        <label>2. Vyber soubory (CSV nebo ZIP):</label>
        <input type="file" id="fileInput" multiple accept=".csv,.zip">
        <div class="info-box">Můžeš vybrat více CSV najednou.</div>
    </div>

    <button class="btn-import" id="importBtn">PROVÉST IMPORT</button>

    <div id="status"></div>
</div>

<script>
    const categorySelect = document.getElementById('categorySelect');
    const fileInput = document.getElementById('fileInput');
    const importBtn = document.getElementById('importBtn');
    const status = document.getElementById('status');

    // NAČTENÍ KATEGORIÍ Z LOCALSTORAGE
    function loadCategories() {
        const categories = JSON.parse(localStorage.getItem('pl_categories') || '{}');
        Object.keys(categories).sort().forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.innerText = cat;
            categorySelect.appendChild(opt);
        });
    }
    loadCategories();

    importBtn.onclick = async () => {
        const files = Array.from(fileInput.files);
        if (files.length === 0) {
            alert("Vyber prosím soubory k importu.");
            return;
        }

        const targetCat = categorySelect.value;
        let allLessons = JSON.parse(localStorage.getItem('pl_lessons') || '{}');
        let categories = JSON.parse(localStorage.getItem('pl_categories') || '{}');
        let count = 0;

        for (const file of files) {
            if (file.name.endsWith('.zip')) {
                const zip = await JSZip.loadAsync(file);
                const promises = [];
                zip.forEach((path, entry) => {
                    if (!entry.dir && path.endsWith('.csv') && !path.includes('__MACOSX')) {
                        promises.push(entry.async("string").then(content => {
                            const lName = path.split('/').pop().replace('.csv', '');
                            processEntry(lName, content, targetCat, allLessons, categories);
                            count++;
                        }));
                    }
                });
                await Promise.all(promises);
            } else {
                const content = await file.text();
                const lName = file.name.replace('.csv', '');
                processEntry(lName, content, targetCat, allLessons, categories);
                count++;
            }
        }

        // ULOŽENÍ
        localStorage.setItem('pl_lessons', JSON.stringify(allLessons));
        localStorage.setItem('pl_categories', JSON.stringify(categories));

        status.className = 'success';
        status.innerHTML = `✅ Úspěšně naimportováno ${count} lekcí do: ${targetCat === 'none' ? 'Hlavní menu' : targetCat}`;
    };

    function processEntry(name, content, category, allLessons, allCategories) {
        // Parsování CSV
        const lines = content.split('\n').filter(l => l.trim().length > 0);
        const words = lines.map(line => {
            const delim = line.includes(';') ? ';' : ',';
            const p = line.split(delim).map(item => item.trim());
            return { nl: p[0] || '', ipa: (p[1] || '').replace(/[\[\]]/g, ''), cz: p[2] || '' };
        });

        // Uložení lekce
        allLessons[name] = words;

        // Zařazení do kategorie
        if (category !== 'none') {
            if (!allCategories[category]) allCategories[category] = [];
            if (!allCategories[category].includes(name)) {
                allCategories[category].push(name);
            }
        }
    }
</script>

</body>
</html>
