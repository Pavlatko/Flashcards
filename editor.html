<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Editor</title>

<style>

body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:10px;
}

.card{
    max-width:700px;
    margin:auto;
    background:white;
    border-radius:16px;
    padding:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
    margin-top:0;
    text-align:center;
    color:#2196F3;
}

select,input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:1rem;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.toolbar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:10px;
    justify-content:center;
}
.toolbar-bottom{
    display:flex;
    justify-content:right;
    align-items:right;
}

.btn{background:#2196F3;color:white}
.btn-green{background:#4CAF50;color:white}
.btn-red{background:#e53935;color:white}
.btn-del-all{margin-top:10px;}
.btn-gray{background:#777;color:white}
.btn-purple{background:#9c27b0;color:white}

.word strong{
    font-size:1.1rem;
}

.word small{
    display:block;
    color:#777;
}

.list{
    max-height:45vh;
    overflow:auto;
    transition:max-height 0.25s;
}

.headerCollapsed + .searchBox + #resultCount + #dupResults + .list{
    max-height:70vh;
}

.sticky{
    position:sticky;
    bottom:0;
    background:white;
    padding-top:10px;
    border-top:2px solid #eee;
}

.dupBox{
    background:#fafafa;
    border-radius:10px;
    padding:10px;
    margin-top:10px;
}

.searchBox{
    position:relative;
}

#search{
    padding-right:40px;
}

#clearSearch{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    
    width:20px;
    height:20px;
    border-radius:50%;
    
    border:none;
    background:#dcdcdc;
    color:#444;

    align-items:center;
    justify-content:center;

    font-size:14px;
    cursor:pointer;

    display:none;
}

#clearSearch:hover{
    background:#ccc;
}

.toast{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    background:#323232;
    color:white;
    padding:12px 20px;
    border-radius:12px;
    font-size:0.95rem;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    opacity:0;
    transition:0.3s;
    z-index:999;
}

.toast.show{
    opacity:1;
}

.word{
    padding:12px;
    border-bottom:1px solid #eee;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:space-between;
}

.wordContent{
    flex:1;
}

.wordRight{
    display:flex;
    align-items:center;
    gap:10px;
}

.wordRight input{
    transform:scale(1.4);
}

.headerBox{
    border:2px solid #eee;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
    background:white;
}

.headerTop{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}

.toggleHeader{
    position:absolute;
    right:0;
    top:50%;
    transform:translateY(-50%);

    cursor:pointer;
    font-size:18px;

    background:#eee;
    border:none;
    border-radius:8px;

    width:34px;
    height:34px;

    display:flex;
    align-items:center;
    justify-content:center;
}

.headerContent{
    margin-top:10px;
}

.headerCollapsed .headerContent{
    display:none;
}

.dupList{
    margin:8px 0 0 18px;
    padding:0;
}

.dupItem{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
}

.dupText{
    line-height:1.3;
}

.dupLesson{
    font-style:italic;
    color:#777;
}

.dupDelete{
    border:none;
    background:#e53935;
    color:white;
    border-radius:6px;
    padding:4px 8px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<div id="headerBox" class="headerBox">

<div class="headerTop">
<h2 style="margin:0;text-align:center;width:100%">✏️ Flashcards editor</h2>
<button class="toggleHeader" onclick="toggleHeader()">⌃</button>
</div>

<div class="headerContent">

<select id="category"></select>
<select id="lesson"></select>

<div class="toolbar">
    <button class="btn-green" onclick="showAddWord()">+ slovíčko</button>
    <button class="btn" onclick="newLesson()">+ lekce</button>
    <button class="btn-red" onclick="deleteLesson()">🗑 lekce</button>
    <button id="dupBtn" class="btn-purple" onclick="toggleDuplicates()">🔎 duplicitní</button>
</div>

<div class="searchBox">
<input id="search" placeholder="🔎 hledat..." oninput="renderWords();toggleClearBtn()">
<button id="clearSearch" onclick="clearSearch()">×</button>
</div>
<div id="resultCount" style="margin:6px 0 10px 0;color:#666;font-size:0.9rem;text-align:center">
Počet záznamů: 0
</div>

<div id="dupResults"></div>
</div>
</div>

<div class="list" id="list"></div>

<div class="toolbar-bottom" id="deleteSelectedBar">
    <button class="btn-red btn-del-all" onclick="deleteSelected()">Smazat označené</button>
</div>

<div class="sticky" id="addWordBox" style="display:none">

<input id="nl" placeholder="Nizozemsky" oninput="autoIPA()">
<input id="ipa" placeholder="IPA">
<input id="cz" placeholder="Česky">

<div class="toolbar">
    <button class="btn-green" onclick="saveWord()">ULOŽIT</button>
    <button class="btn" onclick="saveAndNext()">+ DALŠÍ</button>
    <button class="btn-gray" onclick="clearForm()">RESET</button>
	<button class="btn-red" onclick="cancelAdd()">STORNO</button>
</div>

</div>

</div>

<script>

let lessons = JSON.parse(localStorage.getItem('pl_lessons') || '{}')
let categories = JSON.parse(localStorage.getItem('pl_categories') || '{}')
let duplicatesMode = false

let editIndex = null
let editLesson = null
let originalWord = null
let selected = new Set()

function toggleDuplicates(){

    if(duplicatesMode){
        closeDuplicates()
        return
    }

    duplicatesMode = true
    renderDuplicates()

}

function save(){
    localStorage.setItem('pl_lessons', JSON.stringify(lessons))
    localStorage.setItem('pl_categories', JSON.stringify(categories))
}

function loadCategories(){

    const c = document.getElementById("category")
    c.innerHTML = ""

    let o2 = document.createElement("option")
    o2.value = "all"
    o2.innerText = "-- všechny kategorie --"
    c.appendChild(o2)

    let o1 = document.createElement("option")
    o1.value = "none"
    o1.innerText = "[ Hlavní nabídka ]"
    c.appendChild(o1)

    Object.keys(categories)
        .sort()
        .forEach(cat => {

            let op = document.createElement("option")
            op.value = cat
            op.innerText = cat
            c.appendChild(op)

        })

    loadLessons()
}

function loadLessons(){

    const cat = document.getElementById("category").value
    const l = document.getElementById("lesson")

    l.innerHTML = ""

    let list = []

    let first = document.createElement("option")
    first.value = "all"
    first.innerText = "-- všechny lekce --"
    l.appendChild(first)

    if(cat === "none"){

        const used = Object.values(categories).flat()
        list = Object.keys(lessons).filter(x => !used.includes(x))

    }
    else if(cat === "all"){

        list = Object.keys(lessons)

    }
    else{

        list = categories[cat] || []

    }

    list
        .sort((a,b) => a.localeCompare(b, undefined, {numeric:true}))
        .forEach(n => {

            let op = document.createElement("option")
            op.value = n
            op.innerText = n
            l.appendChild(op)

        })

    renderWords()
}

function renderWords(){

	selected.clear()
    if(duplicatesMode){
		renderDuplicates()
		return
	}

	showWordList(true)
	document.getElementById("dupResults").innerHTML = ""

    const cat = document.getElementById("category").value
    const lessonFilter = document.getElementById("lesson").value
    const list = document.getElementById("list")

    list.innerHTML = ""
	let count = 0

    const search = document.getElementById("search").value.toLowerCase()

    let source = {}

    if(lessonFilter && lessonFilter !== "all"){

        source[lessonFilter] = lessons[lessonFilter] || []

    }
    else if(cat === "all"){

        source = lessons

    }
    else if(cat === "none"){

        const used = Object.values(categories).flat()

        Object.keys(lessons).forEach(l=>{
            if(!used.includes(l)) source[l] = lessons[l]
        })

    }
    else{

        (categories[cat] || []).forEach(l=>{
            source[l] = lessons[l]
        })

    }

	let allWords = []

	Object.entries(source).forEach(([lessonName, words]) => {

		words.forEach((w,i)=>{
			allWords.push({
				lesson: lessonName,
				index: i,
				word: w
			})
		})

	})

	allWords.sort((a,b)=>{

		const aa = a.word.nl.replace(/^(de|het)\s+/i,"")
		const bb = b.word.nl.replace(/^(de|het)\s+/i,"")

		return aa.localeCompare(bb,"nl",{sensitivity:"base"})

	})

	allWords.forEach(item=>{

		const w = item.word
		const lessonName = item.lesson
		const i = item.index
            if(search){
                if(!(w.nl + w.cz + w.ipa).toLowerCase().includes(search)) return
            }

            const div = document.createElement("div")
            div.className = "word"

            div.onclick = () => editWord(lessonName,i)

           div.innerHTML = `
<div class="wordContent">
<strong>${w.nl}</strong>
<small>${w.ipa}</small>
<small>${w.cz}</small>
<small style="color:#2196F3">${lessonName}</small>

<div class="toolbar">
<button onclick="event.stopPropagation();editWord('${lessonName}',${i})">✏</button>
<button onclick="event.stopPropagation();deleteWord('${lessonName}',${i})">🗑</button>
</div>
</div>

<div class="wordRight">
<input type="checkbox" onclick="event.stopPropagation()" onchange="toggleSelect('${lessonName}_${i}',this)">
</div>
`

            list.appendChild(div)
			count++

    })

	document.getElementById("resultCount").innerText = "Počet záznamů: " + count

}

function newLesson(){

    const cat = document.getElementById("category").value

    if(cat === "all"){
        alert("Nejdříve vyber kategorii")
        return
    }

    const name = prompt("Název lekce")

    if(!name) return
    if(lessons[name]) return alert("existuje")

    lessons[name] = []

    if(cat !== "none"){
        if(!categories[cat]) categories[cat] = []
        categories[cat].push(name)
    }

    save()
    loadLessons()
}

function deleteLesson(){

    const lesson = document.getElementById("lesson").value

    if(!lesson || lesson === "all"){
        alert("Nejdříve vyber lekci")
        return
    }

    if(!confirm(`Opravdu smazat lekci "${lesson}" ?`)) return

    delete lessons[lesson]

    Object.keys(categories).forEach(c=>{
        categories[c] = categories[c].filter(l => l !== lesson)
    })

    save()
    loadLessons()
}

function saveWord(){

    const lesson = document.getElementById("lesson").value
    if(!lesson || lesson === "all") return alert("Nejdříve vyber lekci")

    const nl = document.getElementById("nl").value.trim()
    const ipa = document.getElementById("ipa").value.trim()
    const cz = document.getElementById("cz").value.trim()

    if(!nl || !cz) return alert("vyplň NL a CZ")

    const word = {nl,ipa,cz}

    let savedWord = null

    if(editIndex === null){

        lessons[lesson].push(word)
        savedWord = word

    }
    else{

        if(!confirm("Opravdu upravit slovíčko?")) return

        lessons[lesson][editIndex] = word
        savedWord = word
        editIndex = null

    }

    save()
    clearForm()
    renderWords()

    if(savedWord){
        showToast(`<b>${savedWord.nl}</b> byl úspěšně uložen do <b>${lesson}</b>`)
    }

}

function saveAndNext(){
    saveWord()
    document.getElementById("nl").focus()
}

function editWord(lesson,i){

    const w = lessons[lesson][i]

    document.getElementById("addWordBox").style.display = "block"

    document.getElementById("nl").value = w.nl
    document.getElementById("ipa").value = w.ipa
    document.getElementById("cz").value = w.cz

    editIndex = i
    editLesson = lesson

    originalWord = {
        nl: w.nl,
        ipa: w.ipa,
        cz: w.cz
    }

    document.getElementById("nl").focus()

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:"smooth"
    })
}

function deleteWord(lesson,i){

    if(!lessons[lesson] || !lessons[lesson][i]){
        alert("Slovíčko už neexistuje.")
        return
    }

    const word = lessons[lesson][i]

    if(!confirm(`Opravdu smazat "${word.nl}" ?`)) return

    lessons[lesson].splice(i,1)

    save()

    const search = document.getElementById("search")

    if(search.value){
        search.value = ""
        toggleClearBtn()
    }

    renderWords()

    if(!lessons[lesson].some(w => w.nl === word.nl)){
        showToast(`<b>${word.nl}</b> bylo odstraněno`)
    }

}

function toggleSelect(i,cb){

    if(cb.checked) selected.add(i)
    else selected.delete(i)

}

function deleteSelected(){

    if(!selected.size) return
    if(!confirm("Smazat označené?")) return

    let map = {}

    selected.forEach(id=>{
        const [lesson,i] = id.split("_")
        if(!map[lesson]) map[lesson] = []
        map[lesson].push(Number(i))
    })

    Object.entries(map).forEach(([lesson,indexes])=>{
        indexes
            .sort((a,b)=>b-a)
            .forEach(i=>{
                lessons[lesson].splice(i,1)
            })
    })

    selected.clear()

    save()
    renderWords()
}

function clearForm(){

    if(editIndex !== null && originalWord){

        document.getElementById("nl").value = originalWord.nl
        document.getElementById("ipa").value = originalWord.ipa
        document.getElementById("cz").value = originalWord.cz

        return
    }

    document.getElementById("nl").value = ""
    document.getElementById("ipa").value = ""
    document.getElementById("cz").value = ""

    editIndex = null
}

async function autoIPA(){

    let nl = document.getElementById("nl").value.trim().toLowerCase()

    if(!nl) return

    nl = nl.replace(/^de |^het /,"")

    try{

        const url = "https://nl.wiktionary.org/w/api.php?action=parse&page="
            + encodeURIComponent(nl) +
            "&prop=text&format=json&origin=*"

        const res = await fetch(url)
        const data = await res.json()

        let html = data.parse.text["*"]

        let parser = new DOMParser()
        let doc = parser.parseFromString(html,"text/html")

        // najde IPA pouze v nizozemské sekci
        let nlSection = doc.querySelector("#Nederlands")

        if(nlSection){

            let ipa = nlSection.parentElement.querySelector(".IPA")

            if(ipa){
                document.getElementById("ipa").value =
                    ipa.textContent
				.split(",")[0]
				.replace(/\//g,"")
				.trim()
                return
            }

        }

    }catch(e){
        console.log("online IPA selhalo")
    }

    // fallback generátor
    let ipa = nl

    ipa = ipa
        .replace(/aa/g,"aː")
        .replace(/ee/g,"eː")
        .replace(/oo/g,"oː")
        .replace(/uu/g,"yː")
        .replace(/eu/g,"øː")
        .replace(/ui/g,"œy")
        .replace(/ij/g,"ɛi")
        .replace(/ng/g,"ŋ")

    document.getElementById("ipa").value = ipa
}

function renderDuplicates(){

	const btn = document.getElementById("dupBtn")

	btn.style.background = "#ff9800"

	showWordList(false)
	document.getElementById("deleteSelectedBar").style.display = "none"

    const cat = document.getElementById("category").value
    const lessonFilter = document.getElementById("lesson").value

    let source = {}

    if(lessonFilter && lessonFilter !== "all"){

        source[lessonFilter] = lessons[lessonFilter] || []

    }
    else if(cat === "all"){

        source = lessons

    }
    else if(cat === "none"){

        const used = Object.values(categories).flat()

        Object.keys(lessons).forEach(l=>{
            if(!used.includes(l)) source[l] = lessons[l]
        })

    }
    else{

        (categories[cat] || []).forEach(l=>{
            source[l] = lessons[l]
        })

    }

    const map = {}
    const dup = []
	let wordCount = 0
	let groupCount = 0

    Object.entries(source).forEach(([lesson,words])=>{
        words.forEach(w=>{

            let key = w.nl.trim().toLowerCase()

            if(!map[key]) map[key] = []

            map[key].push({lesson,word:w})

        })
    })

    Object.entries(map)
    .sort((a,b)=>a[0].localeCompare(b[0],"nl"))
    .forEach(([k,v])=>{
        if(v.length > 1) dup.push({word:k,list:v})
    })

    const box = document.getElementById("dupResults")
    box.innerHTML = ""

    dup.forEach(d=>{

		wordCount += d.list.length
		groupCount++
        const div = document.createElement("div")
        div.className = "dupBox"

        div.innerHTML = `
		<div style="display:flex;justify-content:space-between;align-items:center">
		<b>${d.word}</b> (${d.list.length})
		<button class="dupDelete"
		style="background:#b71c1c"
		onclick="removeDupAll('${d.word}',${d.list.length})">🗑</button>
		</div>
		`

        const ul = document.createElement("ul")
		ul.className = "dupList"

		d.list.forEach((item,index)=>{

			const li = document.createElement("li")
			li.className = "dupItem"

			li.innerHTML = `
		<div class="dupText">
		<div>${item.word.cz}</div>
		<div class="dupLesson">${item.lesson}</div>
		</div>

		<button class="dupDelete"
		onclick="removeDup('${d.word}','${item.lesson}','${item.word.cz}')">✖</button>
		`

			ul.appendChild(li)

		})

		div.appendChild(ul)

        box.appendChild(div)

    })

	document.getElementById("resultCount").innerHTML =
	"Počet slovíček: " + wordCount +
	", počet skupin: " + groupCount
}

function removeDup(word,lesson,cz){

    if(!confirm(`Opravdu odstranit "${word}" z lekce "${lesson}" ?`)) return

    const index = lessons[lesson].findIndex(
        w => w.nl.toLowerCase().trim() === word && w.cz === cz
    )

    if(index !== -1){
        lessons[lesson].splice(index,1)
        save()
        showToast(`<b>${word}</b> bylo odstraněno z <b>${lesson}</b>`)
    }

    renderDuplicates()
}

function removeDupAll(word,count){

    if(!confirm(`Opravdu odstranit "${word}" ze všech zobrazených lekcí?\nCelkem: ${count}x`)) return

    const cat = document.getElementById("category").value
    const lessonFilter = document.getElementById("lesson").value

    let source = []

    if(lessonFilter && lessonFilter !== "all"){

        source = [lessonFilter]

    }
    else if(cat === "all"){

        source = Object.keys(lessons)

    }
    else if(cat === "none"){

        const used = Object.values(categories).flat()
        source = Object.keys(lessons).filter(l => !used.includes(l))

    }
    else{

        source = categories[cat] || []

    }

    let removed = 0

    source.forEach(l=>{

        if(!lessons[l]) return   // ochrana proti crashi

        const before = lessons[l].length

        lessons[l] = lessons[l].filter(
            w => w.nl.toLowerCase().trim() != word
        )

        removed += before - lessons[l].length

    })

    save()

    if(removed){
        showToast(`<b>${word}</b> odstraněno (${removed}x)`)
    }

    renderDuplicates()
}

document.getElementById("category").onchange = loadLessons
document.getElementById("lesson").onchange = renderWords

loadCategories()

function toggleClearBtn(){

    const s = document.getElementById("search")
    const btn = document.getElementById("clearSearch")

    btn.style.display = s.value ? "flex" : "none"

}

function clearSearch(){

    const s = document.getElementById("search")

    s.value = ""
    s.focus()

    toggleClearBtn()
    renderWords()

}

function showWordList(show){

    const list = document.getElementById("list")

    if(show){
        list.style.display = "block"
    }else{
        list.style.display = "none"
    }

}

function closeDuplicates(){

	const btn = document.getElementById("dupBtn")
	btn.style.background = "#9c27b0"

	duplicatesMode = false

    document.getElementById("dupResults").innerHTML = ""

    showWordList(true)

    document.getElementById("deleteSelectedBar").style.display = "flex"

	renderWords()

}

function showAddWord(){

    const lesson = document.getElementById("lesson").value

    if(!lesson || lesson === "all"){
        alert("Nejdříve vyber lekci")
        return
    }

    const box = document.getElementById("addWordBox")

    box.style.display = "block"

    document.getElementById("nl").focus()

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:"smooth"
    })

}

function showToast(text){

    let t = document.createElement("div")
    t.className = "toast"
    t.innerHTML = text

    document.body.appendChild(t)

    setTimeout(()=>{
        t.classList.add("show")
    },50)

    setTimeout(()=>{
        t.classList.remove("show")
        setTimeout(()=>t.remove(),300)
    },3000)

}

function cancelAdd(){

    editIndex = null
    editLesson = null
    originalWord = null

    document.getElementById("nl").value = ""
    document.getElementById("ipa").value = ""
    document.getElementById("cz").value = ""

    document.getElementById("addWordBox").style.display = "none"

}

function toggleHeader(){

    const box = document.getElementById("headerBox")
    const btn = box.querySelector(".toggleHeader")
    const list = document.getElementById("list")

    box.classList.toggle("headerCollapsed")

    if(box.classList.contains("headerCollapsed")){
        btn.innerText = "⌄"
        list.style.maxHeight = "75vh"
    }else{
        btn.innerText = "⌃"
        list.style.maxHeight = "45vh"
    }

}

</script>

</body>
</html>
