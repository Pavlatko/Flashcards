<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Editor</title>

<style>

body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:10px;
}

.card{
    max-width:700px;
    margin:auto;
    background:white;
    border-radius:16px;
    padding:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
    margin-top:0;
    text-align:center;
    color:#2196F3;
}

select,input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:1rem;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.toolbar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

.btn{background:#2196F3;color:white}
.btn-green{background:#4CAF50;color:white}
.btn-red{background:#e53935;color:white}
.btn-gray{background:#777;color:white}
.btn-purple{background:#9c27b0;color:white}

.word{
    padding:12px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.word strong{
    font-size:1.1rem;
}

.word small{
    display:block;
    color:#777;
}

.list{
    max-height:45vh;
    overflow:auto;
}

.sticky{
    position:sticky;
    bottom:0;
    background:white;
    padding-top:10px;
    border-top:2px solid #eee;
}

.dupBox{
    background:#fafafa;
    border-radius:10px;
    padding:10px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<h2>✏️ Editor slovíček</h2>

<select id="category"></select>
<select id="lesson"></select>

<div class="toolbar">
    <button class="btn" onclick="newLesson()">+ lekce</button>
    <button class="btn-red" onclick="deleteLesson()">🗑 lekce</button>
    <button class="btn-gray" onclick="sortWords()">A→Z</button>
    <button class="btn-purple" onclick="findDuplicates()">🔎 duplicity</button>
</div>

<input id="search" placeholder="🔎 hledat..." oninput="renderWords()">

<div id="dupResults"></div>

<div class="list" id="list"></div>

<div class="toolbar">
    <button class="btn-red" onclick="deleteSelected()">🗑 označené</button>
</div>

<div class="sticky">

<input id="nl" placeholder="Nizozemsky" oninput="autoIPA()">
<input id="ipa" placeholder="IPA">
<input id="cz" placeholder="Česky">

<div class="toolbar">
    <button class="btn-green" onclick="saveWord()">ULOŽIT</button>
    <button class="btn" onclick="saveAndNext()">+ DALŠÍ</button>
    <button class="btn-gray" onclick="clearForm()">RESET</button>
</div>

</div>

</div>

<script>

let lessons = JSON.parse(localStorage.getItem('pl_lessons') || '{}')
let categories = JSON.parse(localStorage.getItem('pl_categories') || '{}')

let editIndex = null
let selected = new Set()

function save(){
    localStorage.setItem('pl_lessons', JSON.stringify(lessons))
    localStorage.setItem('pl_categories', JSON.stringify(categories))
}

function loadCategories(){

    const c = document.getElementById("category")
    c.innerHTML = ""

    let o1 = document.createElement("option")
    o1.value = "none"
    o1.innerText = "-- hlavní menu --"
    c.appendChild(o1)

    let o2 = document.createElement("option")
    o2.value = "all"
    o2.innerText = "-- všechny kategorie --"
    c.appendChild(o2)

    Object.keys(categories)
        .sort()
        .forEach(cat => {

            let op = document.createElement("option")
            op.value = cat
            op.innerText = cat
            c.appendChild(op)

        })

    loadLessons()
}

function loadLessons(){

    const cat = document.getElementById("category").value
    const l = document.getElementById("lesson")

    l.innerHTML = ""

    let list = []

    let first = document.createElement("option")
    first.value = "all"
    first.innerText = "-- všechny lekce --"
    l.appendChild(first)

    if(cat === "none"){

        const used = Object.values(categories).flat()
        list = Object.keys(lessons).filter(x => !used.includes(x))

    }
    else if(cat === "all"){

        list = Object.keys(lessons)

    }
    else{

        list = categories[cat] || []

    }

    list
        .sort((a,b) => a.localeCompare(b, undefined, {numeric:true}))
        .forEach(n => {

            let op = document.createElement("option")
            op.value = n
            op.innerText = n
            l.appendChild(op)

        })

    renderWords()
}

function renderWords(){

    const lesson = document.getElementById("lesson").value
    const list = document.getElementById("list")

    list.innerHTML = ""

    if(!lessons[lesson]) return

    const search = document.getElementById("search").value.toLowerCase()

    lessons[lesson].forEach((w,i)=>{

        if(search){
            if(!(w.nl + w.cz + w.ipa).toLowerCase().includes(search)) return
        }

        const div = document.createElement("div")
        div.className = "word"

        div.onclick = () => editWord(i)

        div.innerHTML = `
<label>
<input type="checkbox" onclick="event.stopPropagation()" onchange="toggleSelect(${i},this)">
<strong>${w.nl}</strong>
</label>

<small>${w.ipa}</small>
<small>${w.cz}</small>

<div class="toolbar">
<button onclick="event.stopPropagation();moveWord(${i})">↪</button>
<button onclick="event.stopPropagation();deleteWord(${i})">🗑</button>
</div>
`

        list.appendChild(div)

    })
}

function newLesson(){

    const name = prompt("Název lekce")

    if(!name) return
    if(lessons[name]) return alert("existuje")

    lessons[name] = []

    const cat = document.getElementById("category").value

    if(cat !== "none"){
        if(!categories[cat]) categories[cat] = []
        categories[cat].push(name)
    }

    save()
    loadLessons()
}

function deleteLesson(){

    const lesson = document.getElementById("lesson").value

    if(!confirm("Smazat lekci?")) return

    delete lessons[lesson]

    Object.keys(categories).forEach(c=>{
        categories[c] = categories[c].filter(l => l !== lesson)
    })

    save()
    loadLessons()
}

function saveWord(){

    const lesson = document.getElementById("lesson").value
    if(!lesson) return

    const nl = document.getElementById("nl").value.trim()
    const ipa = document.getElementById("ipa").value.trim()
    const cz = document.getElementById("cz").value.trim()

    if(!nl || !cz) return alert("vyplň NL a CZ")

    const word = {nl,ipa,cz}

    if(editIndex === null){

        lessons[lesson].push(word)

    }
    else{

        if(!confirm("Opravdu upravit slovíčko?")) return

        lessons[lesson][editIndex] = word
        editIndex = null

    }

    save()
    clearForm()
    renderWords()
}

function saveAndNext(){
    saveWord()
    document.getElementById("nl").focus()
}

function editWord(i){

    const lesson = document.getElementById("lesson").value
    const w = lessons[lesson][i]

    document.getElementById("nl").value = w.nl
    document.getElementById("ipa").value = w.ipa
    document.getElementById("cz").value = w.cz

    editIndex = i

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:"smooth"
    })
}

function deleteWord(i){

    const lesson = document.getElementById("lesson").value

    if(!confirm("Smazat slovíčko?")) return

    lessons[lesson].splice(i,1)

    save()
    renderWords()
}

function toggleSelect(i,cb){

    if(cb.checked) selected.add(i)
    else selected.delete(i)

}

function deleteSelected(){

    const lesson = document.getElementById("lesson").value

    if(!selected.size) return

    if(!confirm("Smazat označené?")) return

    lessons[lesson] = lessons[lesson].filter((_,i)=>!selected.has(i))

    selected.clear()

    save()
    renderWords()
}

function moveWord(i){

    const lesson = document.getElementById("lesson").value

    const target = prompt("Do jaké lekce přesunout?")

    if(!target || !lessons[target]) return alert("lekce neexistuje")

    const w = lessons[lesson][i]

    lessons[target].push(w)
    lessons[lesson].splice(i,1)

    save()
    renderWords()
}

function sortWords(){

    const lesson = document.getElementById("lesson").value

    lessons[lesson].sort((a,b)=>a.nl.localeCompare(b.nl,"nl"))

    save()
    renderWords()
}

function clearForm(){

    document.getElementById("nl").value = ""
    document.getElementById("ipa").value = ""
    document.getElementById("cz").value = ""

    editIndex = null
}

function autoIPA(){

    let nl = document.getElementById("nl").value.trim().toLowerCase()

    if(!nl) return

    nl = nl.replace(/^de |^het /,"")

    let ipa = nl

    ipa = ipa
        .replace(/aa/g,"aː")
        .replace(/ee/g,"eː")
        .replace(/oo/g,"oː")
        .replace(/uu/g,"yː")
        .replace(/eu/g,"øː")
        .replace(/ui/g,"œy")
        .replace(/ij/g,"ɛi")
        .replace(/ng/g,"ŋ")

    document.getElementById("ipa").value = ipa
}

function findDuplicates(){

    const cat = document.getElementById("category").value
    const lessonFilter = document.getElementById("lesson").value

    let source = {}

    if(lessonFilter && lessonFilter !== "all"){

        source[lessonFilter] = lessons[lessonFilter] || []

    }
    else if(cat === "all"){

        source = lessons

    }
    else if(cat === "none"){

        const used = Object.values(categories).flat()

        Object.keys(lessons).forEach(l=>{
            if(!used.includes(l)) source[l] = lessons[l]
        })

    }
    else{

        (categories[cat] || []).forEach(l=>{
            source[l] = lessons[l]
        })

    }

    const map = {}
    const dup = []

    Object.entries(source).forEach(([lesson,words])=>{
        words.forEach(w=>{

            let key = w.nl.trim().toLowerCase()

            if(!map[key]) map[key] = []

            map[key].push({lesson,word:w})

        })
    })

    Object.entries(map).forEach(([k,v])=>{
        if(v.length > 1) dup.push({word:k,list:v})
    })

    const box = document.getElementById("dupResults")
    box.innerHTML = ""

    dup.forEach(d=>{

        const div = document.createElement("div")
        div.className = "dupBox"

        div.innerHTML = `<b>${d.word}</b> (${d.list.length})`

        d.list.forEach(item=>{

            const row = document.createElement("div")

            row.innerHTML = `${item.lesson} <button onclick="removeDup('${d.word}','${item.lesson}')">❌</button>`

            div.appendChild(row)

        })

        box.appendChild(div)

    })
}

function removeDup(word,lesson){

    if(!confirm("Opravdu odstranit z lekce?")) return

    lessons[lesson] = lessons[lesson].filter(w=>w.nl.toLowerCase().trim() != word)

    save()
    findDuplicates()
    renderWords()
}

document.getElementById("category").onchange = loadLessons
document.getElementById("lesson").onchange = renderWords

loadCategories()

</script>

</body>
</html>
