<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Flashcards Bulk Importer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .drop-zone { border: 3px dashed #cbd5e0; padding: 40px; text-align: center; cursor: pointer; border-radius: 10px; background: #fafafa; }
        #status { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-weight: bold; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 0.9em; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Flashcards Bulk Importer</h2>
    <p>Nahraj CSV nebo ZIP. Složky v ZIPu se automaticky stanou kategoriemi.</p>
    
    <div class="drop-zone" id="dropZone">
        <strong>Klikni nebo přetáhni soubory (CSV/ZIP)</strong>
        <input type="file" id="fileInput" multiple accept=".csv,.zip" style="display:none">
    </div>

    <div id="status"></div>
    <div id="previewArea"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const status = document.getElementById('status');
    const previewArea = document.getElementById('previewArea');

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        status.className = '';
        status.innerText = "⏳ Importuji...";
        
        // NAČTENÍ DAT POMOCÍ SPRÁVNÝCH KLÍČŮ Z FLASHCARDS.HTML
        let allLessons = JSON.parse(localStorage.getItem('pl_lessons') || '{}');
        let categories = JSON.parse(localStorage.getItem('pl_categories') || '{}');

        for (const file of files) {
            if (file.name.endsWith('.zip')) {
                await processZip(file, allLessons, categories);
            } else if (file.name.endsWith('.csv')) {
                const csvContent = await file.text();
                const lessonName = file.name.replace('.csv', '');
                allLessons[lessonName] = parseCsvContent(csvContent);
            }
        }

        // ULOŽENÍ DO SPRÁVNÝCH KLÍČŮ
        localStorage.setItem('pl_lessons', JSON.stringify(allLessons));
        localStorage.setItem('pl_categories', JSON.stringify(categories));
        
        status.className = 'success';
        status.innerHTML = `✅ Import úspěšný! Otevři hlavní aplikaci Flashcards.`;
        
        renderPreview(allLessons);
    };

    // Převede CSV na formát { nl, ipa, cz }
    function parseCsvContent(text) {
        return text.split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0)
            .map(line => {
                const delimiter = line.includes(';') ? ';' : ',';
                const parts = line.split(delimiter).map(p => p.trim());
                return {
                    nl: parts[0] || '',
                    ipa: (parts[1] || '').replace(/[\[\]]/g, ''), // Odstraní případné závorky
                    cz: parts[2] || ''
                };
            });
    }

    async function processZip(file, allLessons, categories) {
        const zip = await JSZip.loadAsync(file);
        const promises = [];
        
        zip.forEach((relativePath, zipEntry) => {
            if (zipEntry.dir || !relativePath.endsWith('.csv') || relativePath.includes('__MACOSX')) return;

            const p = zipEntry.async("string").then(content => {
                const parts = relativePath.split('/');
                let lessonName = parts[parts.length - 1].replace('.csv', '');
                
                // Pokud je soubor v podsložce, vytvoříme/přidáme do kategorie
                if (parts.length > 1) {
                    const catName = parts[0];
                    if (!categories[catName]) categories[catName] = [];
                    if (!categories[catName].includes(lessonName)) {
                        categories[catName].push(lessonName);
                    }
                }
                
                allLessons[lessonName] = parseCsvContent(content);
            });
            promises.push(p);
        });
        
        await Promise.all(promises);
    }

    function renderPreview(data) {
        let html = "<h3>Náhled v paměti:</h3>";
        for (const [lesson, words] of Object.entries(data)) {
            html += `<strong>${lesson}</strong> (${words.length} slov)<br>`;
        }
        previewArea.innerHTML = html;
    }
</script>

</body>
</html>
